# This config was automatically generated from your source code
# Stacks detected: cicd:github-actions:.github/workflows,deps:node:.,package_manager:yarn:,test:jest:
version: 2.1

# Definindo o ambiente (Node 24) e variáveis globais
executors:
  node-executor:
    docker:
      - image: node:24
    environment:
      NODE_ENV: 'test'
      CI_TIMEOUT: '1800'

jobs:
  # Job: Linting e Type Checking
  lint:
    executor: node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "package-lock.json" }}
      - run:
          name: Instalar dependências (npm install)
          command: npm install --legacy-peer-deps
      - save_cache:
          paths:
            - ./node_modules
          key: v1-deps-{{ checksum "package-lock.json" }}
      - run:
          name: Executar Lint TS
          command: npm run lint:ts
      - run:
          name: Executar Lint Format
          command: npm run lint:format

  # Job: Testes Unitários (Atualizado para usar Yarn)
  test-unit:
    executor: node-executor
    parallelism: 3
    steps:
      - checkout
      # Tenta restaurar o cache buscando pelo yarn.lock primeiro
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "yarn.lock" }}
            - v1-deps-{{ checksum "package-lock.json" }}
      - run:
          name: Instalar dependências
          command: |
            if [ -f yarn.lock ]; then
              yarn install --frozen-lockfile
            else
              npm ci
            fi
      - save_cache:
          paths:
            - ./node_modules
          key: v1-deps-{{ checksum "yarn.lock" }}
      - run:
          name: Executar testes unitários com Yarn
          command: yarn run test --coverage
      - store_artifacts:
          path: reports/coverage/
          destination: coverage-report

  # Job: Testes E2E (Playwright)
  test-e2e:
    executor: node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "package-lock.json" }}
      - run:
          name: Instalar dependências (npm ci)
          command: npm ci
      - run:
          name: Instalar dependências do Playwright
          command: npx playwright install --with-deps
      - run:
          name: Executar testes E2E
          command: npm run e2e
      - store_artifacts:
          path: playwright-report/
          destination: playwright-report
      - store_artifacts:
          path: test-results/
          destination: test-results

# Orquestração dos Jobs
workflows:
  quality-workflow:
    jobs:
      - lint
      - test-unit
      - test-e2e:
          requires:
            - lint
            - test-unit
